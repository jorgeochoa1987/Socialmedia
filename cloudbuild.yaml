steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "gcr.io/$PROJECT_ID/socialmedia-api:$COMMIT_SHA", "./apps/api"]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "gcr.io/$PROJECT_ID/socialmedia-web:$COMMIT_SHA", "./apps/web"]

  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/socialmedia-api:$COMMIT_SHA"]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/socialmedia-web:$COMMIT_SHA"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "socialmedia-api",
        "--image",
        "gcr.io/$PROJECT_ID/socialmedia-api:$COMMIT_SHA",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated"
      ]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "socialmedia-web",
        "--image",
        "gcr.io/$PROJECT_ID/socialmedia-web:$COMMIT_SHA",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated"
      ]

images:
  - gcr.io/$PROJECT_ID/socialmedia-api:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/socialmedia-web:$COMMIT_SHA
